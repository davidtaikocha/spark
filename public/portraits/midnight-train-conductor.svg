<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0e1a"/>
      <stop offset="100%" stop-color="#0d090f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#c9a86c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="uniform" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a30"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
  </defs>
  <rect width="640" height="768" fill="url(#bg)"/>
  <ellipse cx="320" cy="370" rx="280" ry="320" fill="url(#glow)"/>

  <!-- Train tracks at bottom -->
  <line x1="0" y1="700" x2="640" y2="700" stroke="#847a8e" stroke-width="3" opacity="0.08"/>
  <line x1="0" y1="710" x2="640" y2="710" stroke="#847a8e" stroke-width="3" opacity="0.08"/>
  <!-- Sleepers -->
  <g opacity="0.05" stroke="#847a8e" stroke-width="4">
    <line x1="80" y1="695" x2="80" y2="715"/>
    <line x1="160" y1="695" x2="160" y2="715"/>
    <line x1="240" y1="695" x2="240" y2="715"/>
    <line x1="320" y1="695" x2="320" y2="715"/>
    <line x1="400" y1="695" x2="400" y2="715"/>
    <line x1="480" y1="695" x2="480" y2="715"/>
    <line x1="560" y1="695" x2="560" y2="715"/>
  </g>

  <!-- Conductor hat -->
  <ellipse cx="320" cy="180" rx="75" ry="18" fill="#1a1a30"/>
  <rect x="268" y="140" width="104" height="42" rx="5" fill="#1a1a30"/>
  <ellipse cx="320" cy="142" rx="48" ry="12" fill="#1a1a30"/>
  <!-- Hat band -->
  <rect x="268" y="165" width="104" height="8" rx="2" fill="#c9a86c" opacity="0.3"/>
  <!-- Hat badge -->
  <circle cx="320" cy="155" r="8" fill="#c9a86c" opacity="0.25"/>
  <path d="M316 155 L320 148 L324 155 L320 152 Z" fill="#c9a86c" opacity="0.35"/>

  <!-- Head -->
  <ellipse cx="320" cy="230" rx="55" ry="60" fill="#1e1530"/>
  <ellipse cx="320" cy="235" rx="50" ry="52" fill="#2a1e3a"/>

  <!-- Composed expression -->
  <ellipse cx="300" cy="232" rx="8" ry="10" fill="#0d090f"/>
  <ellipse cx="340" cy="232" rx="8" ry="10" fill="#0d090f"/>
  <circle cx="301" cy="229" r="3" fill="#c9a86c" opacity="0.7"/>
  <circle cx="341" cy="229" r="3" fill="#c9a86c" opacity="0.7"/>

  <!-- Yearning expression - slight parted lips -->
  <path d="M310 258 Q320 263 330 258" fill="none" stroke="#d4698a" stroke-width="1.5" opacity="0.4"/>

  <!-- Body - uniform -->
  <path d="M255 290 Q320 270 385 290 L400 620 Q320 660 240 620 Z" fill="url(#uniform)"/>
  <!-- Double breasted buttons -->
  <g opacity="0.3" fill="#c9a86c">
    <circle cx="300" cy="340" r="4"/>
    <circle cx="340" cy="340" r="4"/>
    <circle cx="300" cy="390" r="4"/>
    <circle cx="340" cy="390" r="4"/>
    <circle cx="300" cy="440" r="4"/>
    <circle cx="340" cy="440" r="4"/>
  </g>

  <!-- Epaulettes -->
  <rect x="248" y="290" width="25" height="8" rx="3" fill="#c9a86c" opacity="0.2"/>
  <rect x="367" y="290" width="25" height="8" rx="3" fill="#c9a86c" opacity="0.2"/>
  <!-- Fringe -->
  <g opacity="0.15" stroke="#c9a86c" stroke-width="1">
    <line x1="250" y1="298" x2="250" y2="308"/>
    <line x1="255" y1="298" x2="255" y2="310"/>
    <line x1="260" y1="298" x2="260" y2="308"/>
    <line x1="265" y1="298" x2="265" y2="306"/>
    <line x1="375" y1="298" x2="375" y2="306"/>
    <line x1="380" y1="298" x2="380" y2="308"/>
    <line x1="385" y1="298" x2="385" y2="310"/>
    <line x1="390" y1="298" x2="390" y2="308"/>
  </g>

  <!-- Arms -->
  <path d="M255 320 Q200 380 195 450" fill="none" stroke="#1a1a30" stroke-width="26" stroke-linecap="round"/>
  <path d="M385 320 Q440 380 445 450" fill="none" stroke="#1a1a30" stroke-width="26" stroke-linecap="round"/>

  <!-- Pocket watch chain -->
  <path d="M300 390 Q290 410 285 430" fill="none" stroke="#c9a86c" stroke-width="1.5" opacity="0.3"/>
  <circle cx="283" cy="435" r="7" fill="none" stroke="#c9a86c" stroke-width="1.5" opacity="0.25"/>

  <!-- Whistle-like train whistle in hand -->
  <rect x="438" y="445" width="8" height="20" rx="3" fill="#c9a86c" opacity="0.4"/>

  <!-- Train windows in distance -->
  <g opacity="0.06">
    <rect x="80" y="600" width="20" height="15" rx="2" fill="#c9a86c"/>
    <rect x="110" y="600" width="20" height="15" rx="2" fill="#e89b72"/>
    <rect x="140" y="600" width="20" height="15" rx="2" fill="#c9a86c"/>
    <rect x="480" y="600" width="20" height="15" rx="2" fill="#c9a86c"/>
    <rect x="510" y="600" width="20" height="15" rx="2" fill="#e89b72"/>
    <rect x="540" y="600" width="20" height="15" rx="2" fill="#c9a86c"/>
  </g>

  <!-- Stars in night sky -->
  <circle cx="100" cy="60" r="1.5" fill="#f0e6dc" opacity="0.25"/>
  <circle cx="200" cy="40" r="1" fill="#f0e6dc" opacity="0.2"/>
  <circle cx="450" cy="55" r="1.5" fill="#f0e6dc" opacity="0.22"/>
  <circle cx="550" cy="80" r="1" fill="#f0e6dc" opacity="0.18"/>
  <circle cx="80" cy="120" r="1" fill="#f0e6dc" opacity="0.15"/>
</svg>
