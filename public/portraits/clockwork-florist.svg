<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151518"/>
      <stop offset="100%" stop-color="#0d090f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#c9a86c" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a86c"/>
      <stop offset="100%" stop-color="#8a7040"/>
    </linearGradient>
  </defs>
  <rect width="640" height="768" fill="url(#bg)"/>
  <ellipse cx="320" cy="370" rx="280" ry="300" fill="url(#glow)"/>

  <!-- Large gear behind -->
  <circle cx="320" cy="340" r="160" fill="none" stroke="#c9a86c" stroke-width="3" opacity="0.15"/>
  <circle cx="320" cy="340" r="130" fill="none" stroke="#c9a86c" stroke-width="2" opacity="0.1"/>
  <!-- Gear teeth -->
  <g opacity="0.15" stroke="#c9a86c" stroke-width="3">
    <line x1="320" y1="175" x2="320" y2="155"/>
    <line x1="320" y1="505" x2="320" y2="525"/>
    <line x1="155" y1="340" x2="135" y2="340"/>
    <line x1="485" y1="340" x2="505" y2="340"/>
    <line x1="204" y1="224" x2="190" y2="210"/>
    <line x1="436" y1="224" x2="450" y2="210"/>
    <line x1="204" y1="456" x2="190" y2="470"/>
    <line x1="436" y1="456" x2="450" y2="470"/>
  </g>

  <!-- Head -->
  <ellipse cx="320" cy="230" rx="70" ry="80" fill="#2a2030"/>
  <ellipse cx="320" cy="235" rx="65" ry="72" fill="#352840"/>

  <!-- Hair - precise bob -->
  <path d="M250 210 Q250 160 320 155 Q390 160 390 210 L385 260 Q380 240 320 235 Q260 240 255 260 Z" fill="#5a3d4a"/>

  <!-- Eyes - precise, controlled -->
  <ellipse cx="295" cy="235" rx="10" ry="12" fill="#0d090f"/>
  <ellipse cx="345" cy="235" rx="10" ry="12" fill="#0d090f"/>
  <circle cx="297" cy="232" r="3" fill="#c9a86c" opacity="0.7"/>
  <circle cx="347" cy="232" r="3" fill="#c9a86c" opacity="0.7"/>

  <!-- Small precise mouth -->
  <path d="M310 260 Q320 267 330 260" fill="none" stroke="#d4698a" stroke-width="1.5" opacity="0.6"/>

  <!-- Body - apron -->
  <path d="M260 300 Q320 280 380 300 L400 580 Q320 610 240 580 Z" fill="#2a2030"/>
  <path d="M280 340 L280 550 Q320 570 360 550 L360 340 Q320 320 280 340 Z" fill="#352840"/>

  <!-- Arms holding flowers -->
  <path d="M260 350 Q200 400 190 460" fill="none" stroke="#352840" stroke-width="28" stroke-linecap="round"/>
  <path d="M380 350 Q440 400 450 460" fill="none" stroke="#352840" stroke-width="28" stroke-linecap="round"/>

  <!-- Bouquet -->
  <g transform="translate(320, 440)">
    <!-- Stems -->
    <line x1="-15" y1="40" x2="-10" y2="-20" stroke="#4a7a4a" stroke-width="2"/>
    <line x1="0" y1="40" x2="0" y2="-30" stroke="#4a7a4a" stroke-width="2"/>
    <line x1="15" y1="40" x2="10" y2="-15" stroke="#4a7a4a" stroke-width="2"/>
    <line x1="-8" y1="40" x2="-20" y2="-10" stroke="#4a7a4a" stroke-width="2"/>
    <line x1="8" y1="40" x2="20" y2="-5" stroke="#4a7a4a" stroke-width="2"/>
    <!-- Flowers -->
    <circle cx="-10" cy="-25" r="14" fill="#d4698a" opacity="0.8"/>
    <circle cx="0" cy="-35" r="12" fill="#e89b72" opacity="0.7"/>
    <circle cx="10" cy="-20" r="13" fill="#d4698a" opacity="0.75"/>
    <circle cx="-20" cy="-15" r="11" fill="#c9a86c" opacity="0.7"/>
    <circle cx="20" cy="-10" r="12" fill="#e89b72" opacity="0.65"/>
    <circle cx="-5" cy="-15" r="8" fill="#f0e6dc" opacity="0.5"/>
    <circle cx="5" cy="-28" r="7" fill="#f0e6dc" opacity="0.4"/>
    <!-- Wrapping paper -->
    <path d="M-30 30 Q0 15 30 30 L25 50 Q0 40 -25 50 Z" fill="#c9a86c" opacity="0.3"/>
  </g>

  <!-- Small gear brooch -->
  <circle cx="320" cy="320" r="8" fill="none" stroke="#c9a86c" stroke-width="1.5" opacity="0.6"/>
  <circle cx="320" cy="320" r="3" fill="#c9a86c" opacity="0.5"/>

  <!-- Moon phase marks on apron -->
  <circle cx="305" cy="480" r="5" fill="#c9a86c" opacity="0.15"/>
  <circle cx="320" cy="475" r="6" fill="#c9a86c" opacity="0.2"/>
  <circle cx="335" cy="480" r="5" fill="#c9a86c" opacity="0.15"/>

  <!-- Floating petals -->
  <ellipse cx="170" cy="250" rx="6" ry="3" fill="#d4698a" opacity="0.25" transform="rotate(30 170 250)"/>
  <ellipse cx="470" cy="300" rx="5" ry="2.5" fill="#e89b72" opacity="0.2" transform="rotate(-20 470 300)"/>
  <ellipse cx="200" cy="550" rx="5" ry="2" fill="#d4698a" opacity="0.15" transform="rotate(45 200 550)"/>
</svg>
