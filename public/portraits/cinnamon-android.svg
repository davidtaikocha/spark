<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#18120e"/>
      <stop offset="100%" stop-color="#0d090f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#c9a86c" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e89b72" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="768" fill="url(#bg)"/>
  <ellipse cx="320" cy="380" rx="280" ry="300" fill="url(#glow)"/>

  <!-- Head - rounded robot -->
  <rect x="245" y="160" width="150" height="160" rx="40" fill="#3d3028"/>
  <rect x="250" y="165" width="140" height="150" rx="36" fill="#4a3830"/>

  <!-- Antenna -->
  <line x1="320" y1="160" x2="320" y2="130" stroke="#847a8e" stroke-width="2.5"/>
  <circle cx="320" cy="125" r="6" fill="#e89b72" opacity="0.6"/>
  <circle cx="320" cy="125" r="3" fill="#c9a86c" opacity="0.8"/>

  <!-- Eyes - warm LED -->
  <rect x="278" y="210" width="28" height="22" rx="8" fill="#18120e"/>
  <rect x="334" y="210" width="28" height="22" rx="8" fill="#18120e"/>
  <rect x="280" y="212" width="24" height="18" rx="6" fill="#e89b72" opacity="0.4"/>
  <rect x="336" y="212" width="24" height="18" rx="6" fill="#e89b72" opacity="0.4"/>
  <!-- Eye dots -->
  <circle cx="292" cy="219" r="4" fill="#e89b72" opacity="0.7"/>
  <circle cx="348" cy="219" r="4" fill="#e89b72" opacity="0.7"/>

  <!-- Warm smile -->
  <path d="M300 265 Q320 278 340 265" fill="none" stroke="#c9a86c" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Cheek warmth -->
  <circle cx="268" cy="252" r="12" fill="#e89b72" opacity="0.08"/>
  <circle cx="372" cy="252" r="12" fill="#e89b72" opacity="0.08"/>

  <!-- Body -->
  <rect x="250" y="325" width="140" height="240" rx="25" fill="#3d3028"/>
  <rect x="255" y="330" width="130" height="230" rx="22" fill="#4a3830"/>

  <!-- Chest panel -->
  <rect x="285" y="360" width="70" height="50" rx="10" fill="#18120e" opacity="0.5"/>
  <!-- Heart indicator -->
  <path d="M315 375 L312 371 Q310 368 313 368 Q315 368 315 371 Q315 368 317 368 Q320 368 318 371 Z" fill="#d4698a" opacity="0.6"/>
  <!-- LED dots -->
  <circle cx="300" cy="395" r="3" fill="#c9a86c" opacity="0.4"/>
  <circle cx="315" cy="395" r="3" fill="#e89b72" opacity="0.5"/>
  <circle cx="330" cy="395" r="3" fill="#c9a86c" opacity="0.4"/>

  <!-- Arms -->
  <rect x="210" y="340" width="35" height="150" rx="15" fill="#3d3028"/>
  <rect x="395" y="340" width="35" height="150" rx="15" fill="#3d3028"/>

  <!-- Wrist slot (prints affirmations) -->
  <rect x="395" y="460" width="35" height="8" rx="2" fill="#e89b72" opacity="0.3"/>
  <!-- Tiny paper coming out -->
  <rect x="400" y="468" width="25" height="30" rx="2" fill="#f0e6dc" opacity="0.15"/>
  <line x1="405" y1="475" x2="420" y2="475" stroke="#c9a86c" stroke-width="0.8" opacity="0.3"/>
  <line x1="405" y1="480" x2="418" y2="480" stroke="#c9a86c" stroke-width="0.8" opacity="0.25"/>
  <line x1="405" y1="485" x2="415" y2="485" stroke="#c9a86c" stroke-width="0.8" opacity="0.2"/>

  <!-- Cinnamon swirl on belly -->
  <path d="M320 440 Q335 440 335 455 Q335 470 320 470 Q305 470 305 455 Q305 445 315 445 Q325 445 325 455 Q325 462 320 462" fill="none" stroke="#c9a86c" stroke-width="2" opacity="0.25"/>

  <!-- Warm aroma wisps -->
  <path d="M290 340 Q285 310 295 290" fill="none" stroke="#e89b72" stroke-width="1.5" opacity="0.12"/>
  <path d="M320 335 Q320 305 325 285" fill="none" stroke="#c9a86c" stroke-width="1.5" opacity="0.1"/>
  <path d="M350 340 Q355 310 345 290" fill="none" stroke="#e89b72" stroke-width="1.5" opacity="0.12"/>

  <!-- Floating cinnamon particles -->
  <circle cx="180" cy="250" r="3" fill="#c9a86c" opacity="0.2"/>
  <circle cx="460" cy="280" r="2" fill="#e89b72" opacity="0.18"/>
  <circle cx="200" cy="450" r="2.5" fill="#c9a86c" opacity="0.15"/>
  <circle cx="440" cy="420" r="2" fill="#e89b72" opacity="0.15"/>
</svg>
