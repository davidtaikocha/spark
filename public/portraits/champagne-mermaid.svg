<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1418"/>
      <stop offset="100%" stop-color="#0d090f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#c9a86c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a86c" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#d4698a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c9a86c" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="fin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a86c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4698a" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="640" height="768" fill="url(#bg)"/>
  <ellipse cx="320" cy="380" rx="280" ry="300" fill="url(#glow)"/>

  <!-- Hair - impossibly good, flowing curls -->
  <path d="M230 170 Q200 250 210 350 Q215 320 225 290 Q220 350 230 380" fill="#c9a86c" opacity="0.12"/>
  <path d="M250 160 Q220 230 230 340 Q240 300 245 270" fill="#c9a86c" opacity="0.1"/>
  <path d="M390 170 Q420 250 410 350 Q405 320 395 290 Q400 350 390 380" fill="#c9a86c" opacity="0.12"/>
  <path d="M370 160 Q400 230 390 340 Q380 300 375 270" fill="#c9a86c" opacity="0.1"/>

  <!-- Head -->
  <ellipse cx="320" cy="210" rx="65" ry="72" fill="#2a1e28"/>
  <ellipse cx="320" cy="215" rx="60" ry="65" fill="#352838"/>

  <!-- Top of hair -->
  <path d="M260 195 Q260 145 320 135 Q380 145 380 195" fill="#352838"/>
  <path d="M268 190 Q268 155 320 148 Q372 155 372 190" fill="#c9a86c" opacity="0.08"/>

  <!-- Sparkly eyes -->
  <ellipse cx="298" cy="218" rx="10" ry="12" fill="#0d090f"/>
  <ellipse cx="342" cy="218" rx="10" ry="12" fill="#0d090f"/>
  <circle cx="299" cy="215" r="4" fill="#c9a86c" opacity="0.8"/>
  <circle cx="343" cy="215" r="4" fill="#c9a86c" opacity="0.8"/>
  <circle cx="302" cy="212" r="1.5" fill="#f0e6dc" opacity="0.6"/>
  <circle cx="346" cy="212" r="1.5" fill="#f0e6dc" opacity="0.6"/>

  <!-- Big expression (no indoor voice) -->
  <ellipse cx="320" cy="252" rx="18" ry="12" fill="#1a1321" opacity="0.6"/>
  <path d="M302 250 Q320 245 338 250" fill="none" stroke="#d4698a" stroke-width="2" opacity="0.5"/>

  <!-- Body/torso -->
  <path d="M265 280 Q320 260 375 280 L370 430 Q320 450 270 430 Z" fill="#352838"/>

  <!-- Scales pattern on upper body -->
  <g opacity="0.08" fill="#c9a86c">
    <circle cx="300" cy="360" r="6"/>
    <circle cx="320" cy="355" r="6"/>
    <circle cx="340" cy="360" r="6"/>
    <circle cx="290" cy="380" r="6"/>
    <circle cx="310" cy="375" r="6"/>
    <circle cx="330" cy="375" r="6"/>
    <circle cx="350" cy="380" r="6"/>
  </g>

  <!-- Mermaid tail -->
  <path d="M270 430 Q260 530 280 600 Q300 650 320 680 Q340 650 360 600 Q380 530 370 430" fill="url(#tail)"/>
  <!-- Scales on tail -->
  <g opacity="0.1">
    <path d="M290 470 Q305 465 320 470 Q335 465 350 470" fill="none" stroke="#c9a86c" stroke-width="1"/>
    <path d="M285 500 Q305 495 320 500 Q335 495 355 500" fill="none" stroke="#c9a86c" stroke-width="1"/>
    <path d="M288 530 Q305 525 320 530 Q335 525 352 530" fill="none" stroke="#c9a86c" stroke-width="1"/>
    <path d="M292 560 Q308 555 320 560 Q332 555 348 560" fill="none" stroke="#c9a86c" stroke-width="1"/>
    <path d="M298 590 Q310 585 320 590 Q330 585 342 590" fill="none" stroke="#d4698a" stroke-width="1"/>
  </g>

  <!-- Tail fin -->
  <path d="M320 680 Q280 700 250 720 Q290 700 320 695 Q350 700 390 720 Q360 700 320 680" fill="url(#fin)"/>

  <!-- Arm with champagne glass -->
  <path d="M375 320 Q430 340 450 380" fill="none" stroke="#352838" stroke-width="20" stroke-linecap="round"/>

  <!-- Champagne glass -->
  <path d="M440 360 L435 340 Q445 330 455 340 L450 360" fill="#f0e6dc" opacity="0.15"/>
  <line x1="445" y1="360" x2="445" y2="380" stroke="#f0e6dc" stroke-width="2" opacity="0.15"/>
  <line x1="435" y1="380" x2="455" y2="380" stroke="#f0e6dc" stroke-width="2" opacity="0.15"/>
  <!-- Champagne -->
  <path d="M438 355 Q445 350 452 355 L450 342 Q445 335 440 342 Z" fill="#c9a86c" opacity="0.3"/>

  <!-- Bubbles from champagne -->
  <circle cx="442" cy="330" r="2.5" fill="#c9a86c" opacity="0.3"/>
  <circle cx="448" cy="315" r="2" fill="#c9a86c" opacity="0.25"/>
  <circle cx="440" cy="300" r="1.5" fill="#c9a86c" opacity="0.2"/>
  <circle cx="450" cy="290" r="2" fill="#c9a86c" opacity="0.15"/>

  <!-- Confetti! -->
  <rect x="150" y="200" width="8" height="4" rx="1" fill="#d4698a" opacity="0.4" transform="rotate(30 154 202)"/>
  <rect x="480" y="180" width="7" height="3" rx="1" fill="#c9a86c" opacity="0.35" transform="rotate(-20 484 182)"/>
  <rect x="200" y="350" width="6" height="3" rx="1" fill="#e89b72" opacity="0.3" transform="rotate(45 203 352)"/>
  <rect x="460" y="300" width="8" height="3" rx="1" fill="#d4698a" opacity="0.25" transform="rotate(-35 464 302)"/>
  <rect x="170" y="450" width="7" height="3" rx="1" fill="#c9a86c" opacity="0.2" transform="rotate(15 174 452)"/>
  <rect x="500" y="430" width="6" height="3" rx="1" fill="#e89b72" opacity="0.2" transform="rotate(-45 503 432)"/>
  <circle cx="180" cy="300" r="3" fill="#c9a86c" opacity="0.25"/>
  <circle cx="490" y="250" r="2.5" fill="#d4698a" opacity="0.2"/>
  <circle cx="140" cy="500" r="2" fill="#e89b72" opacity="0.15"/>
</svg>
