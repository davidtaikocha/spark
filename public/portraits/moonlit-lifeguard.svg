<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1220"/>
      <stop offset="100%" stop-color="#0d090f"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="70%" cy="20%" r="35%">
      <stop offset="0%" stop-color="#f0e6dc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bodyGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#4a8ab5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="768" fill="url(#bg)"/>
  <ellipse cx="320" cy="400" rx="300" ry="320" fill="url(#bodyGlow)"/>
  <circle cx="480" cy="130" r="200" fill="url(#moonGlow)"/>

  <!-- Moon -->
  <circle cx="480" cy="130" r="60" fill="#f0e6dc" opacity="0.15"/>
  <circle cx="480" cy="130" r="55" fill="#f0e6dc" opacity="0.1"/>
  <!-- Moon craters -->
  <circle cx="468" cy="118" r="8" fill="#c4b8ae" opacity="0.08"/>
  <circle cx="495" cy="140" r="6" fill="#c4b8ae" opacity="0.06"/>

  <!-- Water/beach line -->
  <path d="M0 620 Q160 600 320 615 Q480 630 640 610 L640 768 L0 768 Z" fill="#0e1220" opacity="0.8"/>
  <path d="M0 620 Q160 600 320 615 Q480 630 640 610" fill="none" stroke="#4a8ab5" stroke-width="1" opacity="0.2"/>

  <!-- Lifeguard chair silhouette -->
  <line x1="140" y1="350" x2="170" y2="600" stroke="#3a2a40" stroke-width="6"/>
  <line x1="240" y1="350" x2="210" y2="600" stroke="#3a2a40" stroke-width="6"/>
  <rect x="130" y="330" width="120" height="30" rx="5" fill="#3a2a40"/>
  <line x1="155" y1="450" x2="225" y2="450" stroke="#3a2a40" stroke-width="4"/>

  <!-- Figure on chair -->
  <!-- Head -->
  <ellipse cx="320" cy="220" rx="55" ry="60" fill="#2a2035"/>
  <ellipse cx="320" cy="225" rx="50" ry="52" fill="#352840"/>

  <!-- Short cropped hair -->
  <path d="M270 210 Q270 175 320 168 Q370 175 370 210" fill="#1a1525"/>

  <!-- Eyes - cool, competent -->
  <ellipse cx="300" cy="225" rx="9" ry="11" fill="#0d090f"/>
  <ellipse cx="340" cy="225" rx="9" ry="11" fill="#0d090f"/>
  <circle cx="301" cy="222" r="3.5" fill="#4a8ab5" opacity="0.8"/>
  <circle cx="341" cy="222" r="3.5" fill="#4a8ab5" opacity="0.8"/>

  <!-- Bashful slight smile -->
  <path d="M310 248 Q320 254 330 248" fill="none" stroke="#d4698a" stroke-width="1.5" opacity="0.4"/>

  <!-- Body - tank top/swimwear -->
  <path d="M265 280 Q320 260 375 280 L390 550 Q320 580 250 550 Z" fill="#2a2035"/>
  <!-- Red cross on chest -->
  <rect x="310" y="310" width="20" height="6" rx="2" fill="#c94a5e" opacity="0.5"/>
  <rect x="317" y="303" width="6" height="20" rx="2" fill="#c94a5e" opacity="0.5"/>

  <!-- Arms -->
  <path d="M265 310 Q220 370 210 430" fill="none" stroke="#2a2035" stroke-width="24" stroke-linecap="round"/>
  <path d="M375 310 Q420 370 430 430" fill="none" stroke="#2a2035" stroke-width="24" stroke-linecap="round"/>

  <!-- Whistle on lanyard -->
  <path d="M310 280 Q300 310 305 330" fill="none" stroke="#c9a86c" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="305" cy="335" rx="8" ry="5" fill="#c9a86c" opacity="0.6"/>
  <circle cx="298" cy="335" r="3" fill="#e89b72" opacity="0.5"/>

  <!-- Candle in hand -->
  <rect x="422" y="400" width="8" height="35" rx="3" fill="#f0e6dc" opacity="0.4"/>
  <!-- Candle flame -->
  <ellipse cx="426" cy="395" rx="6" ry="10" fill="#e89b72" opacity="0.6"/>
  <ellipse cx="426" cy="393" rx="3" ry="6" fill="#c9a86c" opacity="0.5"/>

  <!-- Moonlight reflection on water -->
  <ellipse cx="480" cy="650" rx="40" ry="4" fill="#f0e6dc" opacity="0.04"/>
  <ellipse cx="480" cy="660" rx="25" ry="3" fill="#f0e6dc" opacity="0.03"/>

  <!-- Stars -->
  <circle cx="100" cy="80" r="1.5" fill="#f0e6dc" opacity="0.3"/>
  <circle cx="250" cy="50" r="1" fill="#f0e6dc" opacity="0.25"/>
  <circle cx="350" cy="70" r="1.5" fill="#f0e6dc" opacity="0.2"/>
  <circle cx="560" cy="60" r="1" fill="#f0e6dc" opacity="0.2"/>
  <circle cx="580" cy="250" r="1.5" fill="#f0e6dc" opacity="0.15"/>
</svg>
