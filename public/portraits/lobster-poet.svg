<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1321"/>
      <stop offset="100%" stop-color="#0d090f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#d4698a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="claw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c94a5e"/>
      <stop offset="100%" stop-color="#8b2a3a"/>
    </linearGradient>
    <linearGradient id="blazer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d2244"/>
      <stop offset="100%" stop-color="#271832"/>
    </linearGradient>
  </defs>
  <rect width="640" height="768" fill="url(#bg)"/>
  <ellipse cx="320" cy="360" rx="280" ry="320" fill="url(#glow)"/>

  <!-- Blazer body -->
  <path d="M220 420 L260 320 Q320 280 380 320 L420 420 L440 620 Q320 660 200 620 Z" fill="url(#blazer)" opacity="0.9"/>
  <path d="M260 320 L300 350 L320 310 L340 350 L380 320" fill="none" stroke="#d4698a" stroke-width="2" opacity="0.6"/>

  <!-- Lobster head/face -->
  <ellipse cx="320" cy="260" rx="80" ry="90" fill="#b8384f"/>
  <ellipse cx="320" cy="270" rx="70" ry="75" fill="#c94a5e"/>

  <!-- Eyes -->
  <ellipse cx="295" cy="245" rx="12" ry="14" fill="#1a1321"/>
  <ellipse cx="345" cy="245" rx="12" ry="14" fill="#1a1321"/>
  <circle cx="298" cy="241" r="4" fill="#f0e6dc" opacity="0.8"/>
  <circle cx="348" cy="241" r="4" fill="#f0e6dc" opacity="0.8"/>

  <!-- Antennae -->
  <path d="M290 195 Q260 140 230 120" fill="none" stroke="#d4698a" stroke-width="3" stroke-linecap="round"/>
  <path d="M350 195 Q380 140 410 120" fill="none" stroke="#d4698a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="228" cy="118" r="6" fill="#e89b72"/>
  <circle cx="412" cy="118" r="6" fill="#e89b72"/>

  <!-- Claws -->
  <ellipse cx="175" cy="420" rx="45" ry="35" fill="url(#claw)" transform="rotate(-15 175 420)"/>
  <ellipse cx="160" cy="405" rx="20" ry="30" fill="#c94a5e" transform="rotate(-30 160 405)"/>
  <ellipse cx="465" cy="420" rx="45" ry="35" fill="url(#claw)" transform="rotate(15 465 420)"/>
  <ellipse cx="480" cy="405" rx="20" ry="30" fill="#c94a5e" transform="rotate(30 480 405)"/>

  <!-- Quill in claw -->
  <line x1="480" y1="390" x2="520" y2="300" stroke="#c9a86c" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M520 300 Q530 280 520 260 Q515 275 510 270 Q518 285 520 300" fill="#c9a86c" opacity="0.8"/>

  <!-- Velvet lapel detail -->
  <path d="M280 340 L320 380 L360 340" fill="none" stroke="#e89b72" stroke-width="1.5" opacity="0.5"/>

  <!-- Tear drops (cries at smooth jazz) -->
  <ellipse cx="282" cy="268" rx="3" ry="5" fill="#7ec8e3" opacity="0.5"/>
  <ellipse cx="360" cy="272" rx="3" ry="5" fill="#7ec8e3" opacity="0.5"/>

  <!-- Atmospheric particles -->
  <circle cx="150" cy="200" r="2" fill="#d4698a" opacity="0.3"/>
  <circle cx="490" cy="180" r="1.5" fill="#e89b72" opacity="0.25"/>
  <circle cx="200" cy="600" r="2.5" fill="#c9a86c" opacity="0.2"/>
  <circle cx="450" cy="550" r="1.5" fill="#d4698a" opacity="0.2"/>
</svg>
